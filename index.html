<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>English Learning App</title>

<style>
body {
  font-family: Arial;
  padding: 16px;
  max-width: 720px;
  margin: auto;
}
input, textarea, button {
  width: 100%;
  margin: 6px 0;
  padding: 8px;
  font-size: 15px;
}
textarea {
  min-height: 80px;
}
.toolbar, .row {
  display: flex;
  gap: 6px;
}
.toolbar button, .row button {
  flex: 1;
}
.card {
  border: 1px solid #ccc;
  padding: 10px;
  margin-top: 10px;
  border-radius: 6px;
}
.en {
  color: #0077cc;
  margin-top: 6px;
}
.vi {
  white-space: pre-wrap;
}
.study-box {
  border: 2px solid #0077cc;
  padding: 12px;
  border-radius: 8px;
  margin-bottom: 12px;
  background: #f9fcff;
}
.stats {
  font-weight: bold;
  margin: 8px 0;
}
label {
  display: block;
  margin: 8px 0;
}
.hidden {
  display: none;
}
</style>
</head>

<body>

<h2>📘 English Learning App</h2>

<div class="toolbar">
  <button onclick="exportData()">📤 Xuất</button>
  <button onclick="importData()">📥 Nhập</button>
  <button onclick="resetLearned()">🔄 Reset đã thuộc</button>
  <button onclick="clearAll()">🗑 Xoá toàn bộ</button>
</div>

<div class="stats" id="stats"></div>

<h3 id="editSection">➕ / ✏️ Thêm – Sửa câu</h3>
<textarea id="viInput" placeholder="Câu tiếng Việt (giữ nguyên xuống dòng, emoji…)"></textarea>
<textarea id="enInput" placeholder="Câu tiếng Anh"></textarea>
<button onclick="saveSentence()">💾 Lưu</button>
<button id="cancelBtn" onclick="cancelEdit()" class="hidden">❌ Huỷ</button>

<hr>

<h3>📚 Học từng câu (10 câu / batch – random)</h3>

<div class="study-box hidden" id="studyBox">
  <div class="row">
    <button onclick="speakCurrent()">🔊 Nghe</button>
    <button onclick="toggleStudyEn()">👁 Ẩn / Hiện EN</button>
  </div>

  <label>
    <input type="checkbox" id="learnedCheckbox" onchange="markLearned()">
    ✅ Đã thuộc (loại vĩnh viễn)
  </label>

  <div class="row">
    <button onclick="prevSentence()">⏮ Trước</button>
    <button onclick="nextSentence()">⏭ Tiếp</button>
  </div>

  <div id="studyVi" class="vi"></div>
  <div id="studyEn" class="en hidden"></div>

  <div class="row">
    <button onclick="startStudy()">➡️ Học 10 câu tiếp theo</button>
  </div>
</div>

<button onclick="startStudy()">▶️ Bắt đầu học</button>

<hr>

<h3>📂 Ôn tập</h3>
<div id="list"></div>

<input type="file" id="fileInput" accept=".json" hidden>

<script>
const STORAGE_KEY = "english_sentences";
let editIndex = null;

/* ===== DATA ===== */
function getData() {
  return JSON.parse(localStorage.getItem(STORAGE_KEY)) || [];
}
function saveData(data) {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
  updateStats();
}

/* ===== STATS ===== */
function updateStats() {
  const d = getData();
  const learned = d.filter(s => s.learned).length;
  stats.textContent = `📊 Đã thuộc: ${learned} / Tổng: ${d.length}`;
}

/* ===== CRUD ===== */
function saveSentence() {
  const vi = viInput.value;
  const en = enInput.value.trim();
  if (!vi || !en) return alert("Nhập đủ câu");

  const d = getData();
  if (editIndex !== null) {
    d[editIndex] = { ...d[editIndex], vi, en };
    editIndex = null;
    cancelBtn.classList.add("hidden");
  } else {
    d.push({ vi, en, learned: false });
  }
  saveData(d);
  viInput.value = "";
  enInput.value = "";
  renderList();
}

function editSentence(i) {
  const s = getData()[i];
  viInput.value = s.vi;
  enInput.value = s.en;
  editIndex = i;
  cancelBtn.classList.remove("hidden");

  document.getElementById("editSection")
    .scrollIntoView({ behavior: "smooth" });
}

function cancelEdit() {
  editIndex = null;
  viInput.value = "";
  enInput.value = "";
  cancelBtn.classList.add("hidden");
}

function deleteSentence(i) {
  if (!confirm("Xoá câu này?")) return;
  const d = getData();
  d.splice(i, 1);
  saveData(d);
  renderList();
}

function clearAll() {
  if (!confirm("⚠️ Xoá toàn bộ dữ liệu?")) return;
  localStorage.removeItem(STORAGE_KEY);
  renderList();
  updateStats();
}

function resetLearned() {
  if (!confirm("Reset trạng thái đã thuộc?")) return;
  const d = getData().map(s => ({ ...s, learned: false }));
  saveData(d);
  renderList();
}

/* ===== LIST ===== */
function renderList() {
  list.innerHTML = "";
  getData().forEach((s, i) => {
    const div = document.createElement("div");
    div.className = "card";

    const vi = document.createElement("div");
    vi.className = "vi";
    vi.textContent = s.vi;

    const row = document.createElement("div");
    row.className = "row";
    row.innerHTML = `
      <button onclick="speak('${s.en.replace(/'/g,"\\'")}')">🔊</button>
      <button onclick="toggleEn(${i})">👁</button>
      <button onclick="editSentence(${i})">✏️</button>
      <button onclick="deleteSentence(${i})">🗑</button>
    `;

    const en = document.createElement("div");
    en.className = "en hidden";
    en.id = "en-" + i;
    en.textContent = s.en;

    div.appendChild(vi);
    div.appendChild(row);
    div.appendChild(en);

    if (s.learned) {
      const learned = document.createElement("div");
      learned.textContent = "✅ Đã thuộc";
      div.appendChild(learned);
    }

    list.appendChild(div);
  });

  updateStats();
}

/* ===== STUDY ===== */
let batch = [];
let index = 0;
let history = [];

function startStudy() {
  const pool = getData().filter(s => !s.learned);
  if (!pool.length) return alert("🎉 Không còn câu chưa thuộc");

  batch = shuffle([...pool]).slice(0, 10);
  index = 0;
  history = [];

  studyBox.classList.remove("hidden");
  showStudy();
}

function showStudy() {
  if (!batch.length) {
    studyBox.classList.add("hidden");
    return;
  }
  if (index >= batch.length) index = 0;

  const s = batch[index];
  studyVi.textContent = s.vi;
  studyEn.textContent = s.en;
  studyEn.classList.add("hidden");
  learnedCheckbox.checked = false;
}

function nextSentence() {
  history.push(index);
  index++;
  showStudy();
}

function prevSentence() {
  if (!history.length) return;
  index = history.pop();
  showStudy();
}

function toggleStudyEn() {
  studyEn.classList.toggle("hidden");
}

function markLearned() {
  const s = batch[index];
  const d = getData();
  const i = d.findIndex(x => x.vi === s.vi && x.en === s.en);
  if (i !== -1) {
    d[i].learned = true;
    saveData(d);
  }
  batch.splice(index, 1);
  showStudy();
}

function speakCurrent() {
  speak(studyEn.textContent);
}

/* ===== UTILS ===== */
function toggleEn(i) {
  document.getElementById("en-" + i).classList.toggle("hidden");
}

function speak(text) {
  const u = new SpeechSynthesisUtterance(text);
  u.lang = "en-US";
  speechSynthesis.speak(u);
}

function shuffle(a) {
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

/* ===== IMPORT / EXPORT ===== */
function exportData() {
  const d = localStorage.getItem(STORAGE_KEY);
  if (!d) return alert("Không có dữ liệu");
  const blob = new Blob([d], { type: "application/json" });
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = "english_sentences.json";
  a.click();
}

function importData() {
  fileInput.click();
}
fileInput.addEventListener("change", function () {
  const f = this.files[0];
  if (!f) return;
  const r = new FileReader();
  r.onload = e => {
    saveData(JSON.parse(e.target.result));
    renderList();
  };
  r.readAsText(f);
});

/* INIT */
renderList();
</script>

</body>
</html>
