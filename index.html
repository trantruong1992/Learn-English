<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>English Learning App</title>

<style>
body {
  font-family: Arial;
  padding: 16px;
  max-width: 720px;
  margin: auto;
}
input, textarea, button {
  width: 100%;
  margin: 6px 0;
  padding: 8px;
  font-size: 15px;
}
.toolbar, .row {
  display: flex;
  gap: 6px;
}
.toolbar button, .row button {
  flex: 1;
}
.card {
  border: 1px solid #ccc;
  padding: 10px;
  margin-top: 10px;
  border-radius: 6px;
}
.en {
  color: #0077cc;
  margin-top: 6px;
}
.study-box {
  border: 2px solid #0077cc;
  padding: 12px;
  border-radius: 8px;
  margin-bottom: 12px;
  background: #f9fcff;
}
</style>
</head>

<body>

<h2>📘 English Learning App</h2>

<div class="toolbar">
  <button onclick="exportData()">📤 Xuất bài học</button>
  <button onclick="importData()">📥 Nhập bài học</button>
  <button onclick="clearAll()">🗑️ Xoá toàn bộ</button>
</div>

<!-- ================== CREATE / EDIT ================== -->
<h3 id="editSection">➕ / ✏️ Thêm – Sửa câu</h3>

<textarea id="viInput" placeholder="Câu tiếng Việt"></textarea>
<textarea id="enInput" placeholder="Câu tiếng Anh"></textarea>

<button onclick="saveSentence()">💾 Lưu câu</button>
<button onclick="cancelEdit()" id="cancelBtn" style="display:none;">❌ Huỷ sửa</button>

<hr>

<!-- ================== STUDY MODE ================== -->
<h3>📚 Học từng câu</h3>

<div class="study-box" id="studyBox" style="display:none;">
  <div class="row">
    <button onclick="speakCurrent()">🔊 Nghe</button>
    <button onclick="toggleStudyEn()">👁 Ẩn / Hiện EN</button>
  </div>
  <div class="row">
    <button onclick="prevSentence()">⏮ Câu trước</button>
    <button onclick="nextSentence()">⏭ Câu tiếp</button>
  </div>
  <b id="studyVi"></b>
  <div class="en" id="studyEn" hidden></div>
</div>

<button onclick="startStudy()">▶️ Bắt đầu học</button>

<hr>

<!-- ================== REVIEW ================== -->
<h3>📂 Ôn tập</h3>
<div id="list"></div>

<input type="file" id="fileInput" accept=".json" hidden>

<script>
const STORAGE_KEY = "english_sentences";
let editIndex = null;

/* DATA */
function getData() {
  return JSON.parse(localStorage.getItem(STORAGE_KEY)) || [];
}
function saveData(data) {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
}

/* CRUD */
function saveSentence() {
  const vi = viInput.value.trim();
  const en = enInput.value.trim();
  if (!vi || !en) return alert("Nhập đầy đủ câu");

  const data = getData();
  if (editIndex !== null) {
    data[editIndex] = { vi, en };
    editIndex = null;
    cancelBtn.style.display = "none";
  } else {
    data.push({ vi, en });
  }
  saveData(data);
  viInput.value = "";
  enInput.value = "";
  renderList();
}

function editSentence(i) {
  const s = getData()[i];
  viInput.value = s.vi;
  enInput.value = s.en;
  editIndex = i;
  cancelBtn.style.display = "block";
  editSection.scrollIntoView({ behavior: "smooth" });
}

function cancelEdit() {
  editIndex = null;
  viInput.value = "";
  enInput.value = "";
  cancelBtn.style.display = "none";
}

function deleteSentence(i) {
  if (!confirm("Xoá câu này?")) return;
  const data = getData();
  data.splice(i, 1);
  saveData(data);
  renderList();
}

function clearAll() {
  if (!confirm("⚠️ Xoá toàn bộ danh sách?")) return;
  localStorage.removeItem(STORAGE_KEY);
  renderList();
}

/* LIST */
function renderList() {
  list.innerHTML = "";
  getData().forEach((s, i) => {
    const div = document.createElement("div");
    div.className = "card";
    div.innerHTML = `
      <b>${s.vi}</b>
      <div class="row">
        <button onclick="speak('${s.en.replace(/'/g,"\\'")}')">🔊</button>
        <button onclick="toggleEn(${i})">👁</button>
        <button onclick="editSentence(${i})">✏️</button>
        <button onclick="deleteSentence(${i})">🗑</button>
      </div>
      <div class="en" id="en-${i}" hidden>${s.en}</div>
    `;
    list.appendChild(div);
  });
}

/* STUDY */
let studyList = [], studyIndex = 0, history = [];

function startStudy() {
  studyList = [...getData()].sort(() => Math.random() - 0.5);
  if (!studyList.length) return alert("Không có câu để học");
  studyIndex = 0;
  history = [];
  studyBox.style.display = "block";
  showStudy();
}
function showStudy() {
  if (studyIndex >= studyList.length) {
    alert("🎉 Bạn đã học xong!");
    studyBox.style.display = "none";
    return;
  }
  const s = studyList[studyIndex];
  studyVi.textContent = s.vi;
  studyEn.textContent = s.en;
  studyEn.hidden = true;
}
function nextSentence() {
  history.push(studyIndex);
  studyIndex++;
  showStudy();
}
function prevSentence() {
  if (!history.length) return;
  studyIndex = history.pop();
  showStudy();
}
function toggleStudyEn() {
  studyEn.hidden = !studyEn.hidden;
}
function speakCurrent() {
  speak(studyEn.textContent);
}

/* UTILS */
function toggleEn(i) {
  const el = document.getElementById("en-" + i);
  el.hidden = !el.hidden;
}
function speak(text) {
  const u = new SpeechSynthesisUtterance(text);
  u.lang = "en-US";
  speechSynthesis.speak(u);
}

/* IMPORT / EXPORT */
function exportData() {
  const data = localStorage.getItem(STORAGE_KEY);
  if (!data) return alert("Không có dữ liệu");
  const blob = new Blob([data], { type: "application/json" });
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = "english_sentences.json";
  a.click();
}
function importData() {
  fileInput.click();
}
fileInput.addEventListener("change", function () {
  const file = this.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    saveData(JSON.parse(e.target.result));
    renderList();
  };
  reader.readAsText(file);
});

/* INIT */
renderList();
</script>

</body>
</html>
