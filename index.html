<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>English Learning App</title>

<style>
body {
  font-family: Arial;
  padding: 16px;
  max-width: 720px;
  margin: auto;
}
input, textarea, button {
  width: 100%;
  margin: 6px 0;
  padding: 8px;
  font-size: 15px;
}
.toolbar, .row {
  display: flex;
  gap: 6px;
}
.toolbar button, .row button {
  flex: 1;
}
.card {
  border: 1px solid #ccc;
  padding: 10px;
  margin-top: 10px;
  border-radius: 6px;
}
.en {
  color: #0077cc;
  margin-top: 6px;
}
.study-box {
  border: 2px solid #0077cc;
  padding: 12px;
  border-radius: 8px;
  margin-bottom: 12px;
  background: #f9fcff;
}
.stats {
  font-weight: bold;
  margin: 8px 0;
}
label {
  display: block;
  margin: 8px 0;
}
</style>
</head>

<body>

<h2>📘 English Learning App</h2>

<div class="toolbar">
  <button onclick="exportData()">📤 Xuất</button>
  <button onclick="importData()">📥 Nhập</button>
  <button onclick="resetLearned()">🔄 Reset đã thuộc</button>
  <button onclick="clearAll()">🗑 Xoá toàn bộ</button>
</div>

<div class="stats" id="stats"></div>

<!-- ADD / EDIT -->
<h3 id="editSection">➕ / ✏️ Thêm – Sửa câu</h3>
<textarea id="viInput" placeholder="Câu tiếng Việt"></textarea>
<textarea id="enInput" placeholder="Câu tiếng Anh"></textarea>
<button onclick="saveSentence()">💾 Lưu</button>
<button id="cancelBtn" onclick="cancelEdit()" style="display:none;">❌ Huỷ</button>

<hr>

<!-- STUDY -->
<h3>📚 Học từng câu (10 câu / lượt)</h3>

<div class="study-box" id="studyBox" style="display:none;">
  <div class="row">
    <button onclick="speakCurrent()">🔊 Nghe</button>
    <button onclick="toggleStudyEn()">👁 Ẩn / Hiện EN</button>
  </div>

  <label>
    <input type="checkbox" id="learnedCheckbox" onchange="markLearned()">
    ✅ Đã thuộc (loại khỏi batch)
  </label>

  <div class="row">
    <button onclick="prevSentence()">⏮ Trước</button>
    <button onclick="nextSentence()">⏭ Tiếp</button>
  </div>

  <b id="studyVi"></b>
  <div class="en" id="studyEn" hidden></div>
</div>

<button onclick="startStudy()">▶️ Bắt đầu học</button>

<hr>

<!-- LIST -->
<h3>📂 Ôn tập</h3>
<div id="list"></div>

<input type="file" id="fileInput" accept=".json" hidden>

<script>
const STORAGE_KEY = "english_sentences";
let editIndex = null;

/* DATA */
function getData() {
  return JSON.parse(localStorage.getItem(STORAGE_KEY)) || [];
}
function saveData(data) {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
  updateStats();
}

/* STATS */
function updateStats() {
  const data = getData();
  const learned = data.filter(s => s.learned).length;
  stats.textContent = `📊 Đã thuộc: ${learned} / Tổng: ${data.length}`;
}

/* CRUD */
function saveSentence() {
  const vi = viInput.value.trim();
  const en = enInput.value.trim();
  if (!vi || !en) return alert("Nhập đầy đủ câu");

  const data = getData();
  if (editIndex !== null) {
    data[editIndex] = { ...data[editIndex], vi, en };
    editIndex = null;
    cancelBtn.style.display = "none";
  } else {
    data.push({ vi, en, learned: false });
  }
  saveData(data);
  viInput.value = "";
  enInput.value = "";
  renderList();
}

function editSentence(i) {
  const s = getData()[i];
  viInput.value = s.vi;
  enInput.value = s.en;
  editIndex = i;
  cancelBtn.style.display = "block";
  editSection.scrollIntoView({ behavior: "smooth" });
}

function cancelEdit() {
  editIndex = null;
  viInput.value = "";
  enInput.value = "";
  cancelBtn.style.display = "none";
}

function deleteSentence(i) {
  if (!confirm("Xoá câu này?")) return;
  const data = getData();
  data.splice(i, 1);
  saveData(data);
  renderList();
}

function clearAll() {
  if (!confirm("⚠️ Xoá toàn bộ dữ liệu?")) return;
  localStorage.removeItem(STORAGE_KEY);
  renderList();
  updateStats();
}

function resetLearned() {
  if (!confirm("Reset tất cả trạng thái đã thuộc?")) return;
  const data = getData().map(s => ({ ...s, learned: false }));
  saveData(data);
  renderList();
}

/* LIST */
function renderList() {
  list.innerHTML = "";
  getData().forEach((s, i) => {
    const div = document.createElement("div");
    div.className = "card";
    div.innerHTML = `
      <b>${s.vi}</b>
      <div class="row">
        <button onclick="speak('${s.en.replace(/'/g,"\\'")}')">🔊</button>
        <button onclick="toggleEn(${i})">👁</button>
        <button onclick="editSentence(${i})">✏️</button>
        <button onclick="deleteSentence(${i})">🗑</button>
      </div>
      <div class="en" id="en-${i}" hidden>${s.en}</div>
      ${s.learned ? "✅ Đã thuộc" : ""}
    `;
    list.appendChild(div);
  });
  updateStats();
}

/* STUDY – 10 CÂU / BATCH */
let batch = [];
let studyIndex = 0;
let history = [];

function startStudy() {
  const candidates = getData().filter(s => !s.learned);
  if (!candidates.length)
    return alert("🎉 Không còn câu chưa thuộc!");

  batch = candidates.slice(0, 10); // CHỈ 10 CÂU
  studyIndex = 0;
  history = [];
  studyBox.style.display = "block";
  showStudy();
}

function showStudy() {
  if (!batch.length) {
    alert("🎉 Hoàn thành 10 câu! Bắt đầu batch mới.");
    studyBox.style.display = "none";
    return;
  }

  if (studyIndex >= batch.length) studyIndex = 0;

  const s = batch[studyIndex];
  studyVi.textContent = s.vi;
  studyEn.textContent = s.en;
  studyEn.hidden = true;
  learnedCheckbox.checked = false;
}

function nextSentence() {
  history.push(studyIndex);
  studyIndex++;
  showStudy();
}

function prevSentence() {
  if (!history.length) return;
  studyIndex = history.pop();
  showStudy();
}

function toggleStudyEn() {
  studyEn.hidden = !studyEn.hidden;
}

function markLearned() {
  const current = batch[studyIndex];
  const data = getData();
  const idx = data.findIndex(s => s.vi === current.vi && s.en === current.en);
  if (idx !== -1) {
    data[idx].learned = true;
    saveData(data);
  }
  batch.splice(studyIndex, 1); // LOẠI KHỎI BATCH
  showStudy();
}

function speakCurrent() {
  speak(studyEn.textContent);
}

/* UTILS */
function toggleEn(i) {
  const el = document.getElementById("en-" + i);
  el.hidden = !el.hidden;
}
function speak(text) {
  const u = new SpeechSynthesisUtterance(text);
  u.lang = "en-US";
  speechSynthesis.speak(u);
}

/* IMPORT / EXPORT */
function exportData() {
  const data = localStorage.getItem(STORAGE_KEY);
  if (!data) return alert("Không có dữ liệu");
  const blob = new Blob([data], { type: "application/json" });
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = "english_sentences.json";
  a.click();
}

function importData() {
  fileInput.click();
}
fileInput.addEventListener("change", function () {
  const file = this.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    saveData(JSON.parse(e.target.result));
    renderList();
  };
  reader.readAsText(file);
});

/* INIT */
renderList();
</script>

</body>
</html>
